# =============================================================================
# RetrievalLab — alembic.ini
# =============================================================================
# PURPOSE : Alembic database migration configuration.
#           Run `alembic upgrade head` to apply all pending migrations.
#           Run `alembic revision --autogenerate -m "description"` to create new ones.
# =============================================================================

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Connection URL for SYNC driver (Alembic CLI uses sync psycopg2)
# This is overridden in alembic/env.py using settings.database.sync_url
sqlalchemy.url = postgresql+psycopg2://retrievallab:retrievallab_dev_password@localhost:5432/retrievallab

[post_write_hooks]
hooks = ruff
ruff.type = exec
ruff.executable = %(here)s/.venv/bin/ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
